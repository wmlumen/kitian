<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kitian // Diagnóstico</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020508; color: #c8f5ff; font-family: monospace; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; display: block; }
  .hud { position: fixed; left: 14px; top: 14px; z-index: 10; font-size: 12px; line-height: 1.7; pointer-events: none; }
  .nav { position: fixed; left: 50%; transform: translateX(-50%); top: 14px; z-index: 12; display: flex; gap: 8px; }
  .nav button { background: rgba(0,0,0,0.5); color: #00e5ff; border: 1px solid #00e5ff; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .nav button.active { background: rgba(0,229,255,0.15); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="nav">
  <button data-view="nebula" class="active">NEBULOSA</button>
  <button data-view="datos">DATOS</button>
</div>

<div class="hud" id="hud">
  <div>ESTADO: <span id="h-status">offline</span></div>
  <div>CPU: <span id="h-cpu">-</span></div>
  <div>RAM: <span id="h-ram">-</span></div>
</div>

<div class="hud" id="data-panel" style="display:none; left: auto; right: 14px; text-align: right;">
  <pre id="raw" style="margin:0;font-size:11px;line-height:1.6;color:#00e5ff;"></pre>
</div>

<script>
(() => {
  const cvs = document.getElementById('bg');
  const ctx = cvs.getContext('2d');
  const $ = (id) => document.getElementById(id);

  let W = 0, H = 0, dpr = 1;
  let pts = [];
  const N = 90;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    pts = [];
    for (let i = 0; i < N; i++) {
      pts.push({ x: Math.random() * W, y: Math.random() * H, r: 1 + Math.random() * 2 });
    }
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // links
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.hypot(dx, dy);
        if (d < 120) {
          ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = `rgba(0,229,255,${(1 - d / 120) * 0.45})`; ctx.lineWidth = 0.6; ctx.stroke();
        }
      }
    }

    // nodes
    for (const p of pts) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,229,255,0.9)'; ctx.fill();
    }

    // center text
    ctx.save();
    ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('KITIAN // NEBULA', W / 2, H / 2);
    ctx.restore();

    requestAnimationFrame(frame);
  }

  async function api(p) {
    const r = await fetch('/api' + p, { cache: 'no-store' });
    const j = await r.json().catch(() => ({}));
    return { ok: r.ok, status: r.status, data: j };
  }

  async function tick() {
    try {
      const h = await api('/health');
      $('h-status').textContent = (h.data.health || '-');
      $('h-status').style.color = h.data.health === 'ok' ? '#00ff88' : '#ff6b6b';

      const s = await api('/system');
      $('h-cpu').textContent = (s.data.cpu ?? '-') + '%';
      $('h-ram').textContent = (s.data.ram ?? '-') + '%';

      $('raw').textContent = JSON.stringify({ health: h.data, system: s.data }, null, 2);
    } catch (e) {
      $('h-status').textContent = 'ERROR';
    }
  }

  function setView(name) {
    document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.view === name));
    if (name === 'nebula') {
      $('hud').style.display = 'none';
      $('data-panel').style.display = 'none';
    } else {
      $('hud').style.display = 'block';
      $('data-panel').style.display = 'block';
    }
  }

  document.querySelectorAll('.nav button').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));

  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init(); setView('nebula'); frame(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
